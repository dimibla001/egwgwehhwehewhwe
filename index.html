<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dies Zero — Рынок забирает у слабых</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent-blue: #4DA6FF;
      --accent-cyan: #2FD1FF;
      --text-white: #FFFFFF;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      color: var(--text-white);
    }

    body {
      background: linear-gradient(180deg, #040e1e 0%, #071929 30%, #0d2240 65%, #1a2c42 100%);
    }

    .page {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    .glow-blur {
      position: fixed;
      width: 3000px;
      height: 420px;
      left: 50%;
      transform: translateX(-50%);
      bottom: -190px;
      background: radial-gradient(ellipse at center, rgba(160,190,230,0.16) 0%, rgba(140,170,210,0.08) 40%, transparent 70%);
      pointer-events: none;
      z-index: 2;
      border-radius: 50%;
    }

    .footer-oval {
      position: fixed;
      width: 3000px;
      height: 500px;
      left: 50%;
      transform: translateX(-50%);
      bottom: -390px;
      background: radial-gradient(ellipse at center top, #1e2d42 0%, #15202e 40%, transparent 70%);
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 0 20px 120px;
      text-align: center;
    }

    .top-line {
      width: 100%;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin-top: 12px;
    }

    .logo-area {
      margin-top: clamp(60px, 9vw, 120px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .logo-img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid #2a3a55;
      box-shadow: 0 0 12px rgba(0,0,0,0.4);
    }

    .logo-name {
      font-size: 14px;
      font-weight: 400;
      color: #c8d4e0;
      letter-spacing: 0.04em;
    }

    .headline {
      margin-top: 35px;
      font-size: clamp(34px, 5.2vw, 64px);
      font-weight: 700;
      line-height: 1.45;
      text-align: center;
      color: var(--text-white);
      max-width: 920px;
    }

    .tagline-row {
      margin-top: 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      font-size: 16px;
      font-weight: 400;
      color: #97afc8;
    }

    .tagline-item span {
      color: var(--accent-blue);
      font-weight: 500;
    }

    .cta-wrap { margin-top: 40px; }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 70px;
      height: 56px;
      background: linear-gradient(90deg, #4DA6FF 0%, #40C8F0 50%, #2FD1FF 100%);
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      color: white;
      text-decoration: none;
      letter-spacing: 0.06em;
      box-shadow: 0 4px 24px rgba(77,166,255,0.25);
      transition: all 0.25s ease;
      min-width: 320px;
    }

    .cta-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 32px rgba(77,166,255,0.4);
    }

    .tg-icon { width: 20px; height: 20px; }

    @media (max-width: 700px) {
      .content { padding-bottom: 80px; }
      .headline {
        font-size: 30px;
        line-height: 1.35;
      }
      .tagline-row {
        flex-direction: row;
        gap: 18px;
        font-size: 14px;
      }
      .cta-btn {
        width: 100%;
        max-width: 340px;
        height: 56px;
        border-radius: 18px;
      }
    }
  </style>
</head>

<body>
<div class="page">

  <div class="glow-blur"></div>
  <div class="footer-oval"></div>

  <div class="top-line"></div>

  <div class="content">
    <div class="logo-area">
      <img src="https://i.postimg.cc/W3By8BtC/image.png" alt="Dies Zero Logo" class="logo-img">
      <span class="logo-name">Dies Zero</span>
    </div>

    <h1 class="headline">
      Рынок забирает у слабых<br>
      Мы показываем как<br>
      забирать обратно
    </h1>

    <div class="tagline-row">
      <div class="tagline-item">С нуля до <span>результата</span></div>
      <div class="tagline-item">Только <span>рабочие</span> методы</div>
      <div class="tagline-item">Начни <span>сегодня</span></div>
    </div>

    <div class="cta-wrap">
      <a href="https://t.me/+J5waBWo4LMJjNTA0" target="_blank" class="cta-btn">
        <svg class="tg-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M21.198 2.433a2.242 2.242 0 0 0-1.022.215l-15.9 6.084c-.862.33-.853.806-.157 1.015l4.07 1.27 9.38-5.918c.442-.268.848-.124.515.17l-7.6 6.861-.297 4.3c.437 0 .63-.201.875-.44l2.1-2.044 4.362 3.22c.804.443 1.383.215 1.584-.746l2.86-13.482c.294-1.18-.45-1.715-1.77-1.505z" fill="white"/>
        </svg>
        ПРИСОЕДИНЯЙСЯ
      </a>
    </div>
  </div>

</div>
</body>
</html>
