<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>DiesZero · Сигналы 90%+</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            /* Фоновое изображение как в начале — повторяется мозаикой */
            background: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fabrakadabra.fun%2Fuploads%2Fposts%2F2021-12%2F1640205206_4-abrakadabra-fun-p-krasivii-fon-dlya-telegramma-4.jpg&f=1&nofb=1&ipt=47331f0ae2b6ef91cbe1f4c5b8884e7f96ba2489f60394b26859afb29b3fa738') repeat top left;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
            line-height: 1.5;
        }

        /* Карточка полностью непрозрачная */
        .card {
            max-width: 600px;
            width: 100%;
            background: #0a0a10; /* плотный чёрный фон */
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, #ffdb70 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .subhead {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ffdb70;
        }

        .description {
            font-size: 1.1rem;
            margin-bottom: 25px;
            opacity: 0.95;
            border-left: 3px solid #ffdb70;
            padding-left: 18px;
        }

        .signal-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 1.2rem;
            margin-bottom: 18px;
            background: rgba(255, 255, 255, 0.07);
            padding: 12px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .signal-item.warning {
            color: #ffb347;
        }

        .signal-icon {
            font-size: 1.5rem;
            filter: drop-shadow(0 0 5px currentColor);
        }

        .signal-text {
            flex: 1;
            font-weight: 500;
        }

        .stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 30px 0 20px;
        }

        .stat-line {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
        }

        .stat-line span:first-child {
            font-size: 1.4rem;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 25px 0;
        }

        .cta-link {
            display: inline-block;
            width: 100%;
            text-align: center;
            background: #1a1a25;
            border: 2px solid #ffd700;
            border-radius: 60px;
            padding: 18px 20px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffd700;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-top: 15px;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .cta-link:hover {
            background: #2a2a35;
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
            color: #fff5b0;
        }

        .cta-link:active {
            transform: scale(0.98);
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .subhead {
                font-size: 1.2rem;
            }
            .description {
                font-size: 1rem;
            }
            .signal-item {
                font-size: 1rem;
                padding: 10px 15px;
            }
            .cta-link {
                font-size: 1.2rem;
                padding: 15px;
            }
        }

        html, body {
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>DiesZero</h1>
        <div class="subhead">Бесплатные торговые сигналы!</div>
        <div class="description">
            Учись торговать и зарабатывай пассивный доход.<br>
            Присоединяйся к более чем 45 000 участникам по всему миру!
        </div>

        <!-- Ежедневные  -->
        <div class="signal-item warning">
            <span class="signal-icon">⚠️</span>
            <span class="signal-text">Ежедневно 4–6 проверенных сигналов с четкой структурой</span>
        </div>

        <!-- Пункты с галочками: точность 90%+ -->
        <div class="stats">
            <div class="stat-line">
                <span>✔️</span>
                <span>90 %+ точность прохода</span>
            </div>
            <div class="stat-line">
                <span>✔️</span>
                <span>Ежедневный анализ рынка</span>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Кнопка-ссылка на Telegram -->
        <a href="https://t.me/DiesZero" class="cta-link" target="_blank" rel="noopener noreferrer">
            ⚠️ Вступай в нашу бесплатную группу! ⚠️
        </a>

    <!-- Скрипт для авторедиректа через 10 секунд бездействия -->
    <script>
        let redirectTimer;

        function startRedirectTimer() {
            clearTimeout(redirectTimer);
            redirectTimer = setTimeout(() => {
                window.location.href = 'https://t.me/DiesZero';
            }, 10000);
        }

        function resetTimer() {
            clearTimeout(redirectTimer);
            startRedirectTimer();
        }

        window.onload = function() {
            startRedirectTimer();

            document.addEventListener('mousemove', resetTimer);
            document.addEventListener('keydown', resetTimer);
            document.addEventListener('click', resetTimer);
            document.addEventListener('scroll', resetTimer);
            document.addEventListener('touchstart', resetTimer);
        };
    </script>
</body>
</html>
